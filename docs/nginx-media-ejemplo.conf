# Ejemplo de configuración Nginx para monteazulspa.cl
# Copia o adapta según tu servidor.
# Ruta del proyecto: ajusta según tu servidor (ej. /var/www/monteazulspa).

# Redirección HTTP → HTTPS (si ya tienes certificado)
# Si usas certbot --nginx, certbot puede añadir esto automáticamente
server {
    listen 80;
    server_name monteazulspa.cl www.monteazulspa.cl;
    return 301 https://www.monteazulspa.cl$request_uri;
}

# HTTPS — servidor principal
server {
    listen 443 ssl http2;
    server_name monteazulspa.cl www.monteazulspa.cl;

    # Certificado (Let's Encrypt — ruta típica después de certbot)
    ssl_certificate /etc/letsencrypt/live/monteazulspa.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monteazulspa.cl/privkey.pem;

    # Redirección monteazulspa.cl → www.monteazulspa.cl (limpia)
    if ($host = monteazulspa.cl) {
        return 301 https://www.monteazulspa.cl$request_uri;
    }

    # Archivos estáticos
    location /static/ {
        alias /var/www/monteazulspa/staticfiles/;
    }

    # Archivos media (imágenes de productos)
    location /media/ {
        alias /var/www/monteazulspa/media/;
    }

    # Django (Gunicorn / uWSGI)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
